services:
  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: product-dashboard-frontend:${APP_VERSION:-latest}
    networks:
      proxy-net:
        ipv4_address: 172.21.10.10
    configs:
      - source: nginx_config
        target: /etc/nginx/nginx.conf
    depends_on:
      backend_1:
        condition: service_started
      backend_2:
        condition: service_started

  backend_1:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    image: product-dashboard-backend:${APP_VERSION:-latest}
    env_file:
      - path: ./.env.common
        required: true
      - path: ./.env.local
        required: false
    environment:
      INSTANCE_ID: backend_1
      BACKEND_PORT: ${BACKEND_PORT:-3000}
      POSTGRES_DB: ${POSTGRES_DB:?Ustaw POSTGRES_DB w pliku .env}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    networks:
      proxy-net:
        ipv4_address: 172.21.10.11
      app-net:
        ipv4_address: 172.21.11.11
      db-net:
        ipv4_address: 172.21.12.11
    secrets:
      - db_user
      - db_password
    configs:
      - source: app_config
        target: /app/app.config.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend_2:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    image: product-dashboard-backend:${APP_VERSION:-latest}
    env_file:
      - path: ./.env.common
        required: true
      - path: ./.env.local
        required: false
    environment:
      INSTANCE_ID: backend_2
      BACKEND_PORT: ${BACKEND_PORT:-3000}
      POSTGRES_DB: ${POSTGRES_DB:?Ustaw POSTGRES_DB w pliku .env}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    networks:
      proxy-net:
        ipv4_address: 172.21.10.12
      app-net:
        ipv4_address: 172.21.11.12
      db-net:
        ipv4_address: 172.21.12.12
    secrets:
      - db_user
      - db_password
    configs:
      - source: app_config
        target: /app/app.config.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
      target: runner
    image: product-dashboard-worker:${APP_VERSION:-latest}
    env_file:
      - path: ./.env.common
        required: true
      - path: ./.env.local
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Ustaw POSTGRES_DB w pliku .env}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    networks:
      app-net:
        ipv4_address: 172.21.11.20
      db-net:
        ipv4_address: 172.21.12.20
    secrets:
      - db_user
      - db_password
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      app-net:
        ipv4_address: 172.21.11.10
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Ustaw POSTGRES_DB w pliku .env}
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      db-net:
        ipv4_address: 172.21.12.10
    secrets:
      - db_user
      - db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$(cat /run/secrets/db_user)\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  adminer:
    image: adminer:4
    profiles: ["debug"]
    ports:
      - "8080:8080"
    networks:
      db-net:
        ipv4_address: 172.21.12.30
    depends_on:
      postgres:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4
    profiles: ["debug"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      db-net:
        ipv4_address: 172.21.12.31
    depends_on:
      postgres:
        condition: service_healthy

  db-migrator:
    image: alpine:3.20
    profiles: ["migrate"]
    restart: "no"
    command: ["sh", "-c", "echo db migration demo"]
    networks:
      db-net:
        ipv4_address: 172.21.12.40
    depends_on:
      postgres:
        condition: service_healthy

networks:
  proxy-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.10.0/24
          gateway: 172.21.10.1
  app-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.11.0/24
          gateway: 172.21.11.1
  db-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.12.0/24
          gateway: 172.21.12.1

volumes:
  postgres-data:
  redis-data:

secrets:
  db_user:
    file: ./secrets/db_user.txt
  db_password:
    file: ./secrets/db_password.txt

configs:
  nginx_config:
    file: ./nginx.conf
  app_config:
    file: ./backend/app.config.json
